[bot]
; Max messages kept per chat in DB for LLM context window
max_history_messages = 20
; Default language for new chats before user picks one: en | ru | ua
default_lang = en

[defaults]
; Applied to every new chat row on first seen
; Toxicity: 1=cold irony, 5=nuclear Wednesday
toxicity_level = 3
; Bot answers approx 1 in every N messages; N is random in [freq_min..freq_max]
freq_min = 5
freq_max = 15
; Seconds before bot replies again to same user (direct replies to bot messages)
reply_cooldown_sec = 60
; How many messages back to walk a reply chain for context
reply_chain_depth = 5
; Minimum word count in a message before bot considers responding
min_words = 5

[groq]
; Primary model — best available on Groq as of 2026-03
model = moonshotai/kimi-k2-instruct-0905
vision_model  = meta-llama/llama-4-scout-17b-16e-instruct
whisper_model = whisper-large-v3-turbo
; Slightly above default for wit variance without hallucinations
temperature = 0.85
max_tokens = 1024
top_p = 0.95

[summarizer]
; Lighter model for background user summary updates (cost optimisation)
model = llama-3.3-70b-versatile
max_tokens = 512
temperature = 0.3
